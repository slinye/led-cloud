server:
  port: 9002

spring:
  application:
    name: led-device
  config:
    import: "optional:nacos:led-device.yml"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yml
    sentinel:
      transport:
        dashboard: ${SENTINEL_ADDR:127.0.0.1:8080}
      eager: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/led_management?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

mqtt:
  broker-url: tcp://${MQTT_HOST:127.0.0.1}:${MQTT_PORT:1883}
  client-id: led-server
  username: ${MQTT_USER:}
  password: ${MQTT_PASSWORD:}
  topic-prefix: led

knife4j:
  enable: true
  setting:
    language: zh-CN
