server:
  port: 9001

spring:
  application:
    name: led-auth
  config:
    import: "optional:nacos:led-auth.yml"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yml
    sentinel:
      transport:
        dashboard: ${SENTINEL_ADDR:127.0.0.1:8080}
      eager: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/led_management?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: led-cloud-microservice-jwt-secret-key-2024-min-256bits!!
  expiration: 86400000

knife4j:
  enable: true
  setting:
    language: zh-CN

# 微信小程序配置（在微信公众平台获取）
wechat:
  miniapp:
    appid: ${WECHAT_APPID:}
    secret: ${WECHAT_SECRET:}
    mock: ${WECHAT_MOCK:false}
