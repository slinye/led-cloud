# ============================================
# LED Cloud 开发环境 Docker Compose
# 
# 前置条件:
#   1. ./build.sh                    (一键编译+构建镜像)
#   2. cp .env.example .env && 编辑 .env 填入微信凭证
#   3. docker compose up -d          (启动所有服务)
#
# 服务端口:
#   前端  :82      网关  :9100     Nacos    :8848
#   MySQL :3310    Redis :6382     Sentinel :8088
#   MQTT  :1886    Seata :8091     RabbitMQ :5672 (管理UI :15672)
# ============================================
services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: led-cloud-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: led_management
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3310}:3306"
    volumes:
      - led_cloud_mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    networks:
      - led-cloud-net

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: led-cloud-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_EXTERNAL_PORT:-6382}:6379"
    volumes:
      - led_cloud_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - led-cloud-net

  # ==================== Mosquitto MQTT ====================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: led-cloud-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_EXTERNAL_PORT:-1886}:1883"
      - "${MQTT_WS_EXTERNAL_PORT:-9006}:9001"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - led_cloud_mosquitto_data:/mosquitto/data
      - led_cloud_mosquitto_log:/mosquitto/log
    networks:
      - led-cloud-net

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: led-cloud-rabbitmq
    restart: unless-stopped
    hostname: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-admin123}
      - TZ=Asia/Shanghai
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - led_cloud_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - led-cloud-net

  # ==================== Nacos (注册 + 配置) ====================
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: led-cloud-nacos
    restart: unless-stopped
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
      - JAVA_TOOL_OPTIONS=-Djdk.internal.platform.cgroupv2.force=false
    ports:
      - "${NACOS_EXTERNAL_PORT:-8848}:8848"
      - "${NACOS_GRPC_EXTERNAL_PORT:-9848}:9848"
    volumes:
      - led_cloud_nacos_data:/home/nacos/data
      - ./docker/nacos/application.properties:/home/nacos/conf/application.properties
    networks:
      - led-cloud-net

  # ==================== Sentinel Dashboard ====================
  sentinel:
    build: ./docker/sentinel
    container_name: led-cloud-sentinel
    restart: unless-stopped
    environment:
      - SENTINEL_DASHBOARD_USERNAME=${SENTINEL_USERNAME:-sentinel}
      - SENTINEL_DASHBOARD_PASSWORD=${SENTINEL_PASSWORD:-sentinel}
    ports:
      - "${SENTINEL_EXTERNAL_PORT:-8088}:8080"
    networks:
      - led-cloud-net

  # ==================== Seata Server ====================
  seata:
    image: seataio/seata-server:1.6.1
    container_name: led-cloud-seata
    restart: unless-stopped
    ports:
      - "${SEATA_EXTERNAL_PORT:-8091}:8091"
      - "${SEATA_CONSOLE_EXTERNAL_PORT:-7091}:7091"
    environment:
      - SEATA_PORT=8091
      - STORE_MODE=db
      - STORE_DB_DATASOURCE=druid
      - STORE_DB_URL=jdbc:mysql://mysql:3306/seata?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      - STORE_DB_USERNAME=root
      - STORE_DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
    volumes:
      - ./docker/seata/application.yml:/seata-server/resources/application.yml
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - led-cloud-net

  # ==================== API 网关 ====================
  gateway:
    build: ./led-gateway
    container_name: led-cloud-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-9100}:9000"
    environment:
      NACOS_ADDR: nacos:8848
      SENTINEL_ADDR: sentinel:8080
    depends_on:
      - nacos
      - sentinel
    networks:
      - led-cloud-net

  # ==================== 认证中心 ====================
  auth:
    build: ./led-auth
    container_name: led-cloud-auth
    restart: unless-stopped
    ports:
      - "${AUTH_PORT:-9101}:9001"
    environment:
      NACOS_ADDR: nacos:8848
      SENTINEL_ADDR: sentinel:8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      WECHAT_MOCK: ${WECHAT_MOCK:-true}
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - led-cloud-net

  # ==================== 设备管理服务 ====================
  device:
    build: ./led-device
    container_name: led-cloud-device
    restart: unless-stopped
    ports:
      - "${DEVICE_PORT:-9102}:9002"
    environment:
      NACOS_ADDR: nacos:8848
      SENTINEL_ADDR: sentinel:8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
      mosquitto:
        condition: service_started
    networks:
      - led-cloud-net

  # ==================== 内容管理服务 ====================
  content:
    build: ./led-content
    container_name: led-cloud-content
    restart: unless-stopped
    ports:
      - "${CONTENT_PORT:-9103}:9003"
    environment:
      NACOS_ADDR: nacos:8848
      SENTINEL_ADDR: sentinel:8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      FILE_UPLOAD_DIR: /app/uploads
    volumes:
      - led_cloud_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - led-cloud-net

  # ==================== 调度服务 ====================
  schedule:
    build: ./led-schedule
    container_name: led-cloud-schedule
    restart: unless-stopped
    ports:
      - "${SCHEDULE_PORT:-9104}:9004"
    environment:
      NACOS_ADDR: nacos:8848
      SENTINEL_ADDR: sentinel:8080
      SEATA_ADDR: seata:8091
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
      seata:
        condition: service_started
    networks:
      - led-cloud-net

  # ==================== 前端 (Vue3 + Nginx) ====================
  frontend:
    build: ./frontend
    container_name: led-cloud-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-82}:80"
    depends_on:
      - gateway
    networks:
      - led-cloud-net

volumes:
  led_cloud_mysql_data:
  led_cloud_redis_data:
  led_cloud_mosquitto_data:
  led_cloud_mosquitto_log:
  led_cloud_nacos_data:
  led_cloud_rabbitmq_data:
  led_cloud_uploads:

networks:
  led-cloud-net:
    driver: bridge
